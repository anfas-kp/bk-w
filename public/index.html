<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ZLAQA AI — Launch</title>
<link rel="icon" type="image/png" href="./zlaqa-bk.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #ffffff; color: #000000;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* phase visibility */
.phase { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity .6s ease; }
.phase.active { opacity: 1; pointer-events: auto; }

/* ============ PAGE 1 ============ */
#page1 {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 40px;
}

.logo-img {
  width: clamp(180px, 30vw, 360px);
  animation: img-breath 3.2s ease-in-out infinite alternate;
}
@keyframes img-breath {
  from { transform: scale(0.98); }
  to { transform: scale(1.02); }
}

.launch {
  padding: 16px 48px;
  background: #45B64A; color: #fff;
  border: none; border-radius: 99px;
  font-size: 20px; font-weight: 700; letter-spacing: 1px;
  cursor: pointer; transition: background 0.3s, transform 0.2s;
  box-shadow: 0 4px 14px rgba(69, 182, 74, 0.4);
}
.launch:hover {
  background: #3a9b3f; transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(69, 182, 74, 0.5);
}

/* ============ PAGE 2 — VIDEO ============ */
#page2 { background: #000; z-index: 200; }
#page2 video { width: 100vw; height: 100vh; object-fit: contain; background: #000; display: block; }

.fallback { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 30px; background: #fff; color: #000; }
.fallback.show { display: flex; }
.fb-logo-img { width: clamp(120px, 20vw, 240px); }
.fb-text { letter-spacing: 2px; text-transform: uppercase; color: #666; font-size: 14px; font-weight: 500; }

/* ============ PAGE 3 — GOOGLE ============ */
#page3{background:#fff;color:#202124;z-index:300;display:flex;align-items:center;justify-content:center}
.gwrap{width:100%;max-width:560px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:28px}
.glogo{font-family:'DM Sans',sans-serif;font-weight:700;font-size:clamp(36px,8vw,72px);letter-spacing:-.02em;line-height:1}
.glogo .c1{color:#4285F4}.glogo .c2{color:#EA4335}.glogo .c3{color:#FBBC04}.glogo .c4{color:#4285F4}.glogo .c5{color:#34A853}.glogo .c6{color:#EA4335}
.searchbar{
  width:100%;display:flex;align-items:center;gap:12px;
  border:1.5px solid #dfe1e5;border-radius:999px;padding:14px 20px;
  box-shadow:0 1px 6px rgba(32,33,36,.08);
  background:#fff;
}
.searchbar:hover,.searchbar:focus-within{box-shadow:0 1px 10px rgba(32,33,36,.18);border-color:transparent}
.sicon{flex:0 0 auto;color:#9aa0a6}
.typed{flex:1;font-size:clamp(16px,2.2vw,18px);color:#202124;font-family:inherit;display:flex;align-items:center;min-height:1.4em}
.cursor{display:inline-block;width:2px;height:1.1em;background:#202124;margin-left:2px;animation:blink .6s step-end infinite}
@keyframes blink{50%{opacity:0}}

.status{color:#45B64A;font-weight:500;font-size:14px;letter-spacing:.5px;opacity:0;transition:opacity .3s}
.status.show{opacity:1}
.pbar{width:100%;height:3px;background:#eef0f3;border-radius:2px;overflow:hidden;opacity:0;transition:opacity .3s}
.pbar.show{opacity:1}
.pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#4285F4,#45B64A);transition:width .1s linear}
</style>
</head>
<body>

<!-- ========== PAGE 1 ========== -->
<section id="page1" class="phase active">
  <img src="./zlaqa-bk.png" alt="ZLAQA Logo" class="logo-img" />
  <button class="launch" id="launchBtn">Launch now</button>
</section>

<!-- ========== PAGE 2 — VIDEO ========== -->
<section id="page2" class="phase">
  <video id="launchVideo" src="./vid-1.mp4" playsinline preload="auto"></video>
  <div class="fallback" id="fallback">
    <img src="./zlaqa-bk.png" alt="ZLAQA Logo" class="fb-logo-img" />
    <div class="fb-text">Launch Video Playing…</div>
  </div>
</section>

<!-- ========== PAGE 3 — GOOGLE ========== -->
<section id="page3" class="phase">
  <div class="gwrap">
    <div class="glogo">
      <span class="c1">G</span><span class="c2">o</span><span class="c3">o</span><span class="c4">g</span><span class="c5">l</span><span class="c6">e</span>
    </div>
    <div class="searchbar">
      <svg class="sicon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div class="typed"><span id="typedText"></span><span class="cursor"></span></div>
    </div>
    <div class="pbar" id="pbar"><i></i></div>
  </div>
</section>

<script>
(function(){
  const phases = { p1: document.getElementById('page1'), p2: document.getElementById('page2'), p3: document.getElementById('page3') };
  function show(p) {
    Object.values(phases).forEach(el => el.classList.remove('active'));
    p.classList.add('active');
  }

  const video = document.getElementById('launchVideo');
  const fallback = document.getElementById('fallback');

  function startVideoPhase() {
    show(phases.p2);
    if(video.requestFullscreen) {
      video.requestFullscreen().catch(e => console.log(e));
    } else if(video.webkitRequestFullscreen) {
      video.webkitRequestFullscreen().catch(e => console.log(e));
    }
    
    let started = false;
    const goNext = () => { 
      if(document.fullscreenElement) {
        document.exitFullscreen().catch(e => console.log(e));
      }
      if(started) return; 
      started = true; 
      setTimeout(startGooglePhase, 300);
    };
    
    video.addEventListener('ended', goNext, {once: true});
    video.addEventListener('error', () => {
      fallback.classList.add('show');
      setTimeout(goNext, 3200);
    }, {once: true});
    
    const p = video.play();
    if(p && p.catch) {
      p.catch(() => {
        fallback.classList.add('show');
        setTimeout(goNext, 3200);
      });
    }
  }

  document.getElementById('launchBtn').addEventListener('click', startVideoPhase);

  // Google phase
  function startGooglePhase(){
    show(phases.p3);
    const text='www.zlaqa.com';
    const typed=document.getElementById('typedText');
    typed.textContent='';
    let i=0;
    const tick=()=>{
      if(i<text.length){ typed.textContent+=text[i++]; setTimeout(tick,80); }
      else setTimeout(beginRedirect,500);
    };
    setTimeout(tick,400);
  }

  function beginRedirect(){
    const pbar=document.getElementById('pbar');
    pbar.classList.add('show');
    const fill=pbar.querySelector('i');
    const start=performance.now();
    const dur=3000;
    function frame(t){
      const pct=Math.min(1,(t-start)/dur);
      fill.style.width=(pct*100)+'%';
      if(pct<1) requestAnimationFrame(frame);
      else setTimeout(()=>{ window.location.href='https://www.zlaqa.com'; },300);
    }
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
